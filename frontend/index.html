<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Urban Physio - Premium Physiotherapy Care Across India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Self-heal a poisoned/stale deploy: if a build asset fails to load or the app
      // never mounts (e.g. HTML served in place of a .js chunk -> "Unexpected token '<'"),
      // clear caches/service workers and hard-reload ONCE (sentinel prevents loops).
      (function () {
        var KEY = '__tup_boot_reload';
        function healOnce() {
          try {
            if (sessionStorage.getItem(KEY)) return;
            sessionStorage.setItem(KEY, String(Date.now()));
          } catch (e) {}
          try {
            if (window.caches && caches.keys) {
              caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
            }
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              navigator.serviceWorker.getRegistrations().then(function (rs) {
                rs.forEach(function (r) { r.unregister(); });
              });
            }
          } catch (e) {}
          location.reload();
        }
        window.addEventListener('error', function (e) {
          var t = e && e.target;
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) healOnce();
        }, true);
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (root && root.childElementCount === 0) healOnce();
            else { try { sessionStorage.removeItem(KEY); } catch (e) {} }
          }, 6000);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
